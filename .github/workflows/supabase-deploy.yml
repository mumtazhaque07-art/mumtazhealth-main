name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push database migrations
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID --password ${{ secrets.SUPABASE_DB_PASSWORD }} || true
          supabase db push --project-ref $SUPABASE_PROJECT_ID || true

      - name: Deploy mumtaz-wisdom-guide
        run: supabase functions deploy mumtaz-wisdom-guide --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy create-checkout-session
        run: supabase functions deploy create-checkout-session --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy stripe-webhook
        run: supabase functions deploy stripe-webhook --project-ref $SUPABASE_PROJECT_ID
